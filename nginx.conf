# Nginx reverse proxy for OpenClaw Mission Control
# Place in /etc/nginx/sites-available/mission-control.conf
# Symlink: ln -s /etc/nginx/sites-available/mission-control.conf /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name mission-control.yourdomain.com;

    # Redirect to HTTPS (uncomment when TLS is configured)
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket support for /realtime
    location /realtime {
        proxy_pass http://127.0.0.1:8787/realtime;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }
}

